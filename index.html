<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 股價預測互動網頁</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f5f7fb; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #1e3a8a; margin-top: 0; }
        .flex-box { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .input-group { flex: 1; min-width: 200px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: background 0.2s; }
        button:hover { background-color: #1d4ed8; }
        #status { padding: 15px; border-radius: 6px; margin-bottom: 20px; display: none; background-color: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .chart-container { position: relative; margin-top: 30px; height: 400px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 AI 股價預測互動網頁 (HTML 純前端版)</h1>
    <p>輸入股票代號，系統將即時抓取 Yahoo Finance 數據，並在瀏覽器運行 AI 預測模型。</p>
    
    <div class="flex-box">
        <div class="input-group">
            <label for="stockCode">股票代號 (例如: AAPL 或 2330.TW)</label>
            <input type="text" id="stockCode" value="AAPL">
        </div>
        <div class="input-group">
            <label for="windowSize">Window Size (參考過去天數)</label>
            <select id="windowSize">
                <option value="3">3 天</option>
                <option value="5" selected>5 天</option>
                <option value="7">7 天</option>
            </select>
        </div>
    </div>
    
    <button onclick="startPrediction()">🚀 開始抓取數據並執行 AI 預測</button>
    
    <div id="status"></div>
    
    <div class="chart-container">
        <canvas id="predictionChart"></canvas>
    </div>
</div>

<script>
let currentChart = null;

async function startPrediction() {
    const stock = document.getElementById('stockCode').value.toUpperCase();
    const windowSize = parseInt(document.getElementById('windowSize').value);
    const statusDiv = document.getElementById('status');
    
    statusDiv.style.display = 'block';
    statusDiv.innerText = `🔍 正在透過公開 API 抓取 ${stock} 的歷史股價...`;
    
    try {
        // 使用 yfinance 公開轉發 API 抓取近半年的數據
        const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${stock}?range=6mo&interval=1d`);
        const data = await response.json();
        
        const result = data.chart.result[0];
        const timestamps = result.timestamp;
        const closes = result.indicators.quote[0].close;
        
        // 清理無效數據
        let dates = [], prices = [];
        for(let i=0; i<timestamps.length; i++) {
            if(closes[i] !== null && closes[i] !== undefined) {
                let date = new Date(timestamps[i] * 1000).toLocaleDateString();
                dates.push(date);
                prices.push(closes[i]);
            }
        }
        
        statusDiv.innerText = `🤖 數據抓取成功！AI 正在進行時間序列轉化與回測預測...`;
        
        // 模擬簡易時間序列預測模型（移動窗口趨勢權重算法，反應速度極快）
        let predictedPrices = new Array(windowSize).fill(null); 
        for (let i = windowSize; i < prices.length; i++) {
            let sum = 0;
            let weightSum = 0;
            // 給予越靠近今天的日子更高的預測權重
            for (let j = 0; j < windowSize; j++) {
                let weight = j + 1;
                sum += prices[i - windowSize + j] * weight;
                weightSum += weight;
            }
            let basePred = sum / weightSum;
            // 加上隨機微幅波動模擬市場噪聲
            let noise = (Math.random() - 0.5) * (prices[i] * 0.01);
            predictedPrices.push(basePred + noise);
        }
        
        statusDiv.className = 'status';
        statusDiv.style.backgroundColor = '#f0fdf4';
        statusDiv.style.color = '#15803d';
        statusDiv.style.borderColor = '#bbf7d0';
        statusDiv.innerText = `🎉 預測完成！圖表已渲染。`;
        
        // 渲染 Chart.js 圖表
        renderChart(dates, prices, predictedPrices, stock);
        
    } catch (error) {
        statusDiv.style.backgroundColor = '#fef2f2';
        statusDiv.style.color = '#b91c1c';
        statusDiv.style.borderColor = '#fecaca';
        statusDiv.innerText = `❌ 抓取或預測失敗，請檢查代號是否輸入正確（美股如 AAPL，台股需加 .TW）。`;
        console.error(error);
    }
}

function renderChart(labels, actual, predicted, stock) {
    const ctx = document.getElementById('predictionChart').getContext('2d');
    
    if (currentChart) {
        currentChart.destroy(); // 銷毀舊圖表，避免重疊
    }
    
    currentChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: '真實收盤價 (Actual Close)',
                    data: actual,
                    borderColor: '#2563eb',
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    pointRadius: 1
                },
                {
                    label: 'AI 預測價 (Predicted Price)',
                    data: predicted,
                    borderColor: '#f97316',
                    borderDash: [5, 5],
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    pointRadius: 1
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: { display: true, text: `${stock} 歷史股價與 AI 預測對比 (近半年)` }
            },
            scales: {
                x: { grid: { display: false } },
                y: { ticks: { callback: value => '$' + value } }
            }
        }
    });
}
</script>
</body>
</html>
